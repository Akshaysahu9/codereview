# Render.com — backend deploy config
# Dashboard: New > Blueprint > connect repo, or use these settings manually

services:
  - type: web
    name: codereview-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd tools/eslint-runner && npm install
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: FRONTEND_URL
        sync: false
